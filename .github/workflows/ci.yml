name: CI — Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Backend Tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend    

    env:
      PYTHONPATH: ${{ github.workspace }}/backend   

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate test ECG data
        run: |
          python -c "
          import neurokit2 as nk, pandas as pd, json, os
          os.makedirs('data/mitdb', exist_ok=True)
          for name, (hr, noise) in {'normal_sinus':(72,0.01),'tachycardia':(110,0.01),'bradycardia':(48,0.01),'noisy_normal':(75,0.05)}.items():
              pd.DataFrame({'MLII': nk.ecg_simulate(duration=10,sampling_rate=360,heart_rate=hr,noise=noise)}).to_csv(f'data/mitdb/{name}.csv',index=False)
              json.dump({'record_name':name,'sampling_rate':360,'leads':['MLII'],'duration_seconds':10},open(f'data/mitdb/{name}_meta.json','w'))
          print('ECG data generated')
          "

      - name: Week 1 — ECG Processing
        run: python ../tests/test_week1_pipeline.py

      - name: Week 2 — RAG Pipeline
        run: python ../tests/test_week2_rag.py

      - name: Week 3 — LLM Schema & Prompts
        run: python ../tests/test_week3_llm.py

      - name: Week 4 — Monitoring
        run: python ../tests/test_week4_monitoring.py

  # ── Frontend Build ─────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          npm install
          npm run build

  # ── Deploy to Render ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy Backend
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' | jq .

      - name: Deploy Frontend
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' | jq .